models:
  - name: stg_currency_rates
    description: The data from currency_rates.csv with basic cleaning, type casting and deduplication.
    columns:
      - name: date
        description: The date of the exchange rate.
        data_tests:
          - not_null
      - name: from_currency
        data_tests:
          - not_null
      - name: to_currency
        data_tests:
          - not_null
    tests:
      - dbt_utils.equality:
          compare_model: source('raw_data', 'currency_rates')
          compare_columns:
            - date
            - from_currency
            - to_currency
            - rate