models:
  - name: stg_subscriptions
    description: The data from subscriptions with type casting and processing duplicates for each date and channel.
    columns:
      - name: subscription_id
        data_tests:
          - not_null
      - name: user_id
        data_tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: 
            - subscription_id
            - user_id
            - status
            - created_at
            